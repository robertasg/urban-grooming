<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">

<!-- SEO meta -->
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="author" content="{{ site.email }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:locale" content="{{ site.lang }}">
{% if site.og_image %}
<meta property="og:image" content="{{ site.og_image | absolute_url }}">
{% endif %}


<!-- Structured data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "Urban Grooming",
  "description": "{{ site.description }}",
  "url": "{{ site.url }}",
  "telephone": "+37063042854",
  "email": "{{ site.email }}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "Kęstučio g. 55",
    "addressLocality": "Vilnius",
    "addressCountry": "LT"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": 54.6967176,
    "longitude": 25.2478036
  },
  "sameAs": [
    "https://instagram.com/monikagroomina"
  ]
}
</script>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4M9MTNCX9K"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-4M9MTNCX9K');
</script>
