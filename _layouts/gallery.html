<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{{ "/assets/css/main.css?v=" | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% include head-custom.html %}
  </head>
  <body class="bg-main flex flex-col min-h-screen">
    <!-- <div class="flex flex-col"> -->
      <header class="flex flex-col items-center">
        <img class="min-w-3/4 object-cover invisible md:visible" src="{{ 'assets/img/logo_large.svg' | relative_url}}" alt="Logo" />
        <img class="min-w-screen object-cover visible md:hidden" src="{{ 'assets/img/logo_square.svg' | relative_url}}" alt="Logo" />
          <!-- <h1><a href="{{ "/" | absolute_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>
  
          {% if site.logo %}
            <img src="{{site.logo | relative_url}}" alt="Logo" />
          {% endif %}
  
          <p>{{ site.description | default: site.github.project_tagline }}</p>
  
          {% if site.github.is_project_page %}
          <p class="view"><a href="{{ site.github.repository_url }}">View the Project on GitHub <small>{{ site.github.repository_nwo }}</small></a></p>
          {% endif %}
  
          {% if site.github.is_user_page %}
          <p class="view"><a href="{{ site.github.owner_url }}">View My GitHub Profile</a></p>
          {% endif %}
  
          {% if site.show_downloads %}
          <ul class="downloads">
            <li><a href="{{ site.github.zip_url }}">Download <strong>ZIP File</strong></a></li>
            <li><a href="{{ site.github.tar_url }}">Download <strong>TAR Ball</strong></a></li>
            <li><a href="{{ site.github.repository_url }}">View On <strong>GitHub</strong></a></li>
          </ul>
          {% endif %} -->
      </header>
      <nav class="flex md:flex-row flex-col justify-center p-20">
        <div class="btn-main">
          <a href="https://urbangrooming.setmore.com/lt">Registracija</a>
        </div>
        <div class="btn-main">
          <a href="/gallery">Galerija</a>
        </div>
        <div class="btn-main">
          <a href="/about">Apie mus</a>
        </div>
      </nav>
        <section class="columns-2 gap-12 md:columns-3 p-20 md:max-w-3/4 self-center">
        {% for work_sample in site.data.work_samples %}
          <!-- {% assign index_mod = forloop.index | modulo: 2 %} -->
          {% if forloop.index == 3 or forloop.index == 4 %}
            {% assign transform_class = "-rotate-3" %}
          {% else %}
            {% assign transform_class = "rotate-3" %}
          {% endif %}
          <div class="bg-white p-2 pb-6 mb-6 {{ transform_class }}">
            <img class="mx-auto aspect-square w-full max-w-sm object-cover mb-4" src="{{ work_sample.img | relative_url }}" />
          </div>
        {% endfor %}
      </section>
    <!-- </div> -->
  </body>
</html>
